name: CI

# Runs on every push to main and on every PR targeting main.
# Jobs are structured in three tiers:
#   1. lint + unit-tests  â€” fast, no QEMU, always run in parallel
#   2. build-qemu         â€” build the Docker builder image (QEMU compiled inside)
#   3. integration        â€” smoke tests, pytest QMP suite, Robot Framework
#
# The expensive QEMU build is cached via GitHub Actions Docker layer cache
# (type=gha). First run is slow (~40 min); subsequent runs with unchanged
# patches/ and hw/ are fast (~3 min, fully from cache).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  BUILDER_IMAGE: virtmcu-builder
  PYTHON_VERSION: "3.13"
  # CI runners can be slow; raise the zenoh-clock STALL timeout so the device
  # doesn't fire on load spikes.  Local dev keeps the 5 s default for fast feedback.
  VIRTMCU_STALL_TIMEOUT_MS: "60000"

# â”€â”€ Tier 1: Lint â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€

jobs:

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Ruff â€” Python linting
        run: uv run ruff check tools/ tests/ patches/

      - name: ShellCheck â€” shell scripts
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: '.'
          severity: warning
          ignore_paths: third_party .venv

      - name: Hadolint â€” Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: docker/Dockerfile
          # DL3008: pin apt versions â€” acceptable for a dev toolchain image
          # DL3009: apt-get clean â€” handled by rm -rf /var/lib/apt/lists/*
          # DL4006: set -o pipefail â€” handled by set -euo pipefail in scripts
          # SC2016: $ORIGIN in single quotes is literal, which is intended for rpath
          # SC2015: we use || true for sed commands
          ignore: DL3008,DL3009,DL4006,SC2016,SC2015

  check-versions:
    name: Check Versions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Check version synchronization
        run: python3 scripts/check-versions.py

# â”€â”€ Tier 1: Unit Tests (no QEMU) â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€

  unit-tests:
    name: Unit Tests (no QEMU)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync

      # device-tree-compiler needed by test_fdt_emitter (calls dtc)
      - name: Install dtc
        run: sudo apt-get install -y --no-install-recommends device-tree-compiler

      - name: pytest â€” unit tests with coverage
        run: |
          uv run pytest \
            --cov=tools \
            --cov-report=xml:test-results/unit-coverage.xml \
            --cov-report=term \
            tests/repl2qemu/ \
            tests/test_yaml2qemu.py \
            tests/test_cli_generator.py \
            tests/test_fdt_emitter.py \
            -v --tb=short \
            --junitxml=test-results/unit-tests.xml

      - name: Upload unit test and coverage results
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: unit-test-results
          path: test-results/

# â”€â”€ Tier 2: Build QEMU (Docker, cached) â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€

  build-qemu:
    name: Build QEMU (Docker cache)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Load VERSIONS
        run: cat VERSIONS | grep -v '^#' | grep -v '^$' >> $GITHUB_ENV

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Rust Cache
        uses: swatinem/rust-cache@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Populate the GHA Docker layer cache for the builder stage.
      # The QEMU clone + patch + compile is the expensive part; it is cached
      # as long as patches/, hw/, and scripts/setup-qemu.sh are unchanged.
      - name: Build and cache builder stage
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          target: builder
          tags: ${{ env.BUILDER_IMAGE }}:${{ github.sha }}
          build-args: |
            DEBIAN_CODENAME=${{ env.DEBIAN_CODENAME }}
            NODE_VERSION=${{ env.NODE_VERSION }}
            PYTHON_VERSION=${{ env.PYTHON_VERSION }}
            ARM_TOOLCHAIN_VERSION=${{ env.ARM_TOOLCHAIN_VERSION }}
            QEMU_REF=v${{ env.QEMU_VERSION }}
            ZENOH_C_REF=${{ env.ZENOH_VERSION }}
            CMAKE_VERSION=${{ env.CMAKE_VERSION }}
            RUST_VERSION=${{ env.RUST_VERSION }}
            FLATBUFFERS_VERSION=${{ env.FLATBUFFERS_VERSION }}
          cache-from: type=gha,scope=builder-amd64
          cache-to: type=gha,scope=builder-amd64,mode=max
          load: true

      - name: Verify QEMU binary
        run: |
          docker run --rm ${{ env.BUILDER_IMAGE }}:${{ github.sha }} \
            qemu-system-arm --version

# â”€â”€ Tier 3: Smoke Tests (matrix) â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
#
# Each phase runs its test/phaseX/smoke_test.sh inside the builder container
# with the workspace mounted at /workspace. Phases that need Python packages
# or a .venv get a per-phase pre-setup command.

  smoke-tests:
    name: Smoke â€” Phase ${{ matrix.phase }}
    needs: [build-qemu, unit-tests]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # Phases 1â€“3.5: no Python runtime needed
          - phase: "1"
            pre: "make -C test/phase1"
          - phase: "2"
            pre: ":"
          - phase: "3"
            pre: ":"
          - phase: "3.5"
            pre: "make -C test/phase1 && uv pip install --system --break-system-packages -r pyproject.toml"
          # Phase 4: pytest + robot run directly; needs packages on PATH
          - phase: "4"
            pre: "make -C test/phase1 && uv pip install --system --break-system-packages -r pyproject.toml"
          # Phase 8: smoke_test.sh sources .venv, so we pre-create it with uv
          - phase: "8"
            pre: "make -C test/phase1 && make -C test/phase8 && uv sync"
          - phase: "9"
            pre: "apt-get install -y --no-install-recommends libsystemc-dev 2>/dev/null || true && make -C test/phase1 && uv pip install --system --break-system-packages -r pyproject.toml"
          - phase: "10"
            pre: "make -C test/phase1 && uv pip install --system --break-system-packages -r pyproject.toml"
          - phase: "11"
            pre: "make -C test/riscv"
          - phase: "11_3"
            pre: "cmake -S tools/systemc_adapter -B tools/systemc_adapter/build -DCMAKE_BUILD_TYPE=Release && make -C tools/systemc_adapter/build rp_adapter"
          - phase: "12"
            pre: "make -C test/phase1 && uv pip install --system --break-system-packages -r pyproject.toml"

    steps:
      - uses: actions/checkout@v5

      - name: Load VERSIONS
        run: cat VERSIONS | grep -v '^#' | grep -v '^$' >> $GITHUB_ENV

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Rust Cache
        uses: swatinem/rust-cache@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Re-build from GHA cache â€” fast if no patches/hw changes.
      - name: Restore builder image from cache
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          target: builder
          tags: ${{ env.BUILDER_IMAGE }}:${{ github.sha }}
          build-args: |
            DEBIAN_CODENAME=${{ env.DEBIAN_CODENAME }}
            NODE_VERSION=${{ env.NODE_VERSION }}
            PYTHON_VERSION=${{ env.PYTHON_VERSION }}
            ARM_TOOLCHAIN_VERSION=${{ env.ARM_TOOLCHAIN_VERSION }}
            QEMU_REF=v${{ env.QEMU_VERSION }}
            ZENOH_C_REF=${{ env.ZENOH_VERSION }}
            CMAKE_VERSION=${{ env.CMAKE_VERSION }}
            RUST_VERSION=${{ env.RUST_VERSION }}
            FLATBUFFERS_VERSION=${{ env.FLATBUFFERS_VERSION }}
          cache-from: type=gha,scope=builder-amd64
          load: true

      - name: Run phase ${{ matrix.phase }} smoke test
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            -e PYTHONPATH=/workspace \
            -e VIRTMCU_STALL_TIMEOUT_MS \
            ${{ env.BUILDER_IMAGE }}:${{ github.sha }} \
            bash -c "${{ matrix.pre }} && bash test/phase${{ matrix.phase }}/smoke_test.sh"

# â”€â”€ Tier 3: Phase 16 â€” Performance & Determinism (IPS benchmark) â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
#
# Runs the icount determinism and IPS benchmark.  CI runners are slower than
# developer machines, so the STALL timeout is raised to 60 s via the
# stall-timeout device property (default is 5 s for fast local feedback).

  smoke-phase16:
    name: Smoke â€” Phase 16 (perf & determinism)
    needs: [build-qemu, unit-tests]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Load VERSIONS
        run: cat VERSIONS | grep -v '^#' | grep -v '^$' >> $GITHUB_ENV

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Rust Cache
        uses: swatinem/rust-cache@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Restore builder image from cache
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          target: builder
          tags: ${{ env.BUILDER_IMAGE }}:${{ github.sha }}
          build-args: |
            DEBIAN_CODENAME=${{ env.DEBIAN_CODENAME }}
            NODE_VERSION=${{ env.NODE_VERSION }}
            PYTHON_VERSION=${{ env.PYTHON_VERSION }}
            ARM_TOOLCHAIN_VERSION=${{ env.ARM_TOOLCHAIN_VERSION }}
            QEMU_REF=v${{ env.QEMU_VERSION }}
            ZENOH_C_REF=${{ env.ZENOH_VERSION }}
            CMAKE_VERSION=${{ env.CMAKE_VERSION }}
            RUST_VERSION=${{ env.RUST_VERSION }}
            FLATBUFFERS_VERSION=${{ env.FLATBUFFERS_VERSION }}
          cache-from: type=gha,scope=builder-amd64
          load: true

      - name: Run phase 16 smoke test
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            -e PYTHONPATH=/workspace \
            -e VIRTMCU_STALL_TIMEOUT_MS \
            ${{ env.BUILDER_IMAGE }}:${{ github.sha }} \
            bash -c "
              make -C test/phase1
              make -C test/phase16
              uv pip install --system --break-system-packages -r pyproject.toml
              bash test/phase16/smoke_test.sh
            "

# â”€â”€ Tier 3: Phase 5 â€” SystemC Co-simulation Bridge â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€

  smoke-phase5:
    name: Smoke â€” Phase 5 (SystemC bridge)
    needs: [build-qemu, unit-tests]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Load VERSIONS
        run: cat VERSIONS | grep -v '^#' | grep -v '^$' >> $GITHUB_ENV

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Rust Cache
        uses: swatinem/rust-cache@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Restore builder image from cache
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          target: builder
          tags: ${{ env.BUILDER_IMAGE }}:${{ github.sha }}
          build-args: |
            DEBIAN_CODENAME=${{ env.DEBIAN_CODENAME }}
            NODE_VERSION=${{ env.NODE_VERSION }}
            PYTHON_VERSION=${{ env.PYTHON_VERSION }}
            ARM_TOOLCHAIN_VERSION=${{ env.ARM_TOOLCHAIN_VERSION }}
            QEMU_REF=v${{ env.QEMU_VERSION }}
            ZENOH_C_REF=${{ env.ZENOH_VERSION }}
            CMAKE_VERSION=${{ env.CMAKE_VERSION }}
            RUST_VERSION=${{ env.RUST_VERSION }}
            FLATBUFFERS_VERSION=${{ env.FLATBUFFERS_VERSION }}
          cache-from: type=gha,scope=builder-amd64
          load: true

      - name: Run phase 5 smoke test
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            -e PYTHONPATH=/workspace \
            -e VIRTMCU_STALL_TIMEOUT_MS \
            ${{ env.BUILDER_IMAGE }}:${{ github.sha }} \
            bash -c "
              apt-get install -y --no-install-recommends libsystemc-dev 2>/dev/null || true
              uv pip install --system --break-system-packages -r pyproject.toml
              bash test/phase5/smoke_test.sh
            "

# â”€â”€ Tier 3: Phase 6 â€” Multi-Node Zenoh Coordinator â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€

  smoke-phase6:
    name: Smoke â€” Phase 6 (Zenoh coordinator)
    needs: [build-qemu, unit-tests]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Load VERSIONS
        run: cat VERSIONS | grep -v '^#' | grep -v '^$' >> $GITHUB_ENV

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Rust Cache
        uses: swatinem/rust-cache@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Restore builder image from cache
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          target: builder
          tags: ${{ env.BUILDER_IMAGE }}:${{ github.sha }}
          build-args: |
            DEBIAN_CODENAME=${{ env.DEBIAN_CODENAME }}
            NODE_VERSION=${{ env.NODE_VERSION }}
            PYTHON_VERSION=${{ env.PYTHON_VERSION }}
            ARM_TOOLCHAIN_VERSION=${{ env.ARM_TOOLCHAIN_VERSION }}
            QEMU_REF=v${{ env.QEMU_VERSION }}
            ZENOH_C_REF=${{ env.ZENOH_VERSION }}
            CMAKE_VERSION=${{ env.CMAKE_VERSION }}
            RUST_VERSION=${{ env.RUST_VERSION }}
            FLATBUFFERS_VERSION=${{ env.FLATBUFFERS_VERSION }}
          cache-from: type=gha,scope=builder-amd64
          load: true

      - name: Run phase 6 smoke test
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            -e PYTHONPATH=/workspace \
            -e VIRTMCU_STALL_TIMEOUT_MS \
            ${{ env.BUILDER_IMAGE }}:${{ github.sha }} \
            bash -c "
              uv pip install --system --break-system-packages -r pyproject.toml
              bash test/phase6/smoke_test.sh
            "

# â”€â”€ Tier 3: Phase 7 â€” Zenoh Clock (suspend + icount modes) â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
#
# Phase 7 is self-contained: the smoke test launches QEMU with the zenoh-clock
# device and acts as its own mock TimeAuthority via the Python Zenoh client.
# No MuJoCo or FirmwareStudio stack is required.

  smoke-phase7:
    name: Smoke â€” Phase 7 (zenoh-clock)
    needs: [build-qemu, unit-tests]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Load VERSIONS
        run: cat VERSIONS | grep -v '^#' | grep -v '^$' >> $GITHUB_ENV

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Rust Cache
        uses: swatinem/rust-cache@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Restore builder image from cache
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          target: builder
          tags: ${{ env.BUILDER_IMAGE }}:${{ github.sha }}
          build-args: |
            DEBIAN_CODENAME=${{ env.DEBIAN_CODENAME }}
            NODE_VERSION=${{ env.NODE_VERSION }}
            PYTHON_VERSION=${{ env.PYTHON_VERSION }}
            ARM_TOOLCHAIN_VERSION=${{ env.ARM_TOOLCHAIN_VERSION }}
            QEMU_REF=v${{ env.QEMU_VERSION }}
            ZENOH_C_REF=${{ env.ZENOH_VERSION }}
            CMAKE_VERSION=${{ env.CMAKE_VERSION }}
            RUST_VERSION=${{ env.RUST_VERSION }}
            FLATBUFFERS_VERSION=${{ env.FLATBUFFERS_VERSION }}
          cache-from: type=gha,scope=builder-amd64
          load: true

      - name: Run phase 7 smoke test
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            -e PYTHONPATH=/workspace \
            -e VIRTMCU_STALL_TIMEOUT_MS \
            ${{ env.BUILDER_IMAGE }}:${{ github.sha }} \
            bash -c "
              uv pip install --system --break-system-packages -r pyproject.toml
              bash test/phase7/smoke_test.sh
            "

# â”€â”€ Tier 3: pytest QMP Integration Suite â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
#
# Runs tools/testing/test_qmp.py which launches real QEMU instances and
# communicates via QMP. Enforces the Phase 4 isolation constraint: no
# -device zenoh-clock in standalone tests (validated by conftest.py).

  pytest-qmp:
    name: pytest â€” QMP Integration
    needs: [build-qemu, unit-tests]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Load VERSIONS
        run: cat VERSIONS | grep -v '^#' | grep -v '^$' >> $GITHUB_ENV

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Rust Cache
        uses: swatinem/rust-cache@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Restore builder image from cache
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          target: builder
          tags: ${{ env.BUILDER_IMAGE }}:${{ github.sha }}
          build-args: |
            DEBIAN_CODENAME=${{ env.DEBIAN_CODENAME }}
            NODE_VERSION=${{ env.NODE_VERSION }}
            PYTHON_VERSION=${{ env.PYTHON_VERSION }}
            ARM_TOOLCHAIN_VERSION=${{ env.ARM_TOOLCHAIN_VERSION }}
            QEMU_REF=v${{ env.QEMU_VERSION }}
            ZENOH_C_REF=${{ env.ZENOH_VERSION }}
            CMAKE_VERSION=${{ env.CMAKE_VERSION }}
            RUST_VERSION=${{ env.RUST_VERSION }}
            FLATBUFFERS_VERSION=${{ env.FLATBUFFERS_VERSION }}
          cache-from: type=gha,scope=builder-amd64
          load: true

      - name: Run pytest QMP suite
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            -e PYTHONPATH=/workspace \
            -e VIRTMCU_STALL_TIMEOUT_MS \
            ${{ env.BUILDER_IMAGE }}:${{ github.sha }} \
            bash -c "
              make -C test/phase1
              make -C test/phase8
              uv pip install --system --break-system-packages -r pyproject.toml pytest-cov
              pytest tools/testing/test_qmp.py \
                --cov=tools \
                --cov-report=xml:test-results/qmp-coverage.xml \
                --cov-report=term \
                -v --tb=short \
                --junitxml=test-results/pytest-qmp.xml
            "

      - name: Upload pytest and coverage results
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: pytest-qmp-results
          path: test-results/

# â”€â”€ Tier 3: Robot Framework Test Suite â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
#
# Runs the Renode-compatible keyword suite. Covers the same scenarios as
# pytest-qmp but via the Robot Framework compatibility layer.

  robot-tests:
    name: Robot Framework Tests
    needs: [build-qemu, unit-tests]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Load VERSIONS
        run: cat VERSIONS | grep -v '^#' | grep -v '^$' >> $GITHUB_ENV

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Rust Cache
        uses: swatinem/rust-cache@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Restore builder image from cache
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          target: builder
          tags: ${{ env.BUILDER_IMAGE }}:${{ github.sha }}
          build-args: |
            DEBIAN_CODENAME=${{ env.DEBIAN_CODENAME }}
            NODE_VERSION=${{ env.NODE_VERSION }}
            PYTHON_VERSION=${{ env.PYTHON_VERSION }}
            ARM_TOOLCHAIN_VERSION=${{ env.ARM_TOOLCHAIN_VERSION }}
            QEMU_REF=v${{ env.QEMU_VERSION }}
            ZENOH_C_REF=${{ env.ZENOH_VERSION }}
            CMAKE_VERSION=${{ env.CMAKE_VERSION }}
            RUST_VERSION=${{ env.RUST_VERSION }}
            FLATBUFFERS_VERSION=${{ env.FLATBUFFERS_VERSION }}
          cache-from: type=gha,scope=builder-amd64
          load: true

      - name: Run Robot Framework tests
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            -e PYTHONPATH=/workspace \
            -e VIRTMCU_STALL_TIMEOUT_MS \
            ${{ env.BUILDER_IMAGE }}:${{ github.sha }} \
            bash -c "
              make -C test/phase1
              make -C test/phase8
              uv pip install --system --break-system-packages -r pyproject.toml
              robot \
                --outputdir test-results/robot \
                --xunit test-results/robot.xml \
                --loglevel INFO \
                tests/test_qmp_keywords.robot \
                tests/test_interactive_echo.robot
            "

      - name: Upload Robot results
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: robot-test-results
          path: test-results/

