name: Release Binaries

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

concurrency:
  group: release-binaries-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-binaries:
    name: Build Binaries (${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      packages: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            os: ubuntu-latest
            platform: linux/amd64
          - arch: arm64
            os: ubuntu-24.04-arm
            platform: linux/arm64

    steps:
      - uses: actions/checkout@v6

      - name: Load BUILD_DEPS
        run: grep -E -v '^#|^$' BUILD_DEPS >> "$GITHUB_ENV"

      - name: Log in to GHCR
        # CRITICAL: Required so this workflow can pull the `qemu-base` cache image
        # generated by the `ci-main` workflow from the container registry.
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase image name for GHCR
        run: |
          echo "IMAGE_NAME_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: Compute QEMU cache tag
        run: |
          PATCHES_HASH=$(
            { find patches/ -type f 2>/dev/null | sort | xargs sha256sum 2>/dev/null
              sha256sum scripts/apply-qemu-patches.sh 2>/dev/null
            } | sha256sum | cut -c1-12
          )
          echo "QEMU_CACHE_TAG=${QEMU_VERSION}-${PATCHES_HASH}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build builder stage
        # We use bake-action instead of build-push-action to ensure we perfectly
        # match the build environment defined in docker-bake.hcl (which auto-injects
        # variables from BUILD_DEPS).
        uses: docker/bake-action@v7
        env:
          ARCH: ${{ matrix.arch }}
          IMAGE_TAG: sha-${{ github.sha }}
          # CRITICAL: We MUST pass QEMU_CACHE_TAG. Without it, bake cannot resolve
          # the cache key for the frozen QEMU core, resulting in a cache miss and
          # a 40+ minute full recompilation from scratch on arm64 runners.
          QEMU_CACHE_TAG: ${{ env.QEMU_CACHE_TAG }}
        with:
          targets: builder
          load: true
          # CRITICAL: Disable cache-to (cache export) for release builds.
          # Both 'ci-main' and 'release-binaries' trigger concurrently on tags.
          # If both try to export gigabytes of cache layers to the same GHA cache
          # scope simultaneously, the GitHub Cache service deadlocks and the build
          # hangs indefinitely. Release builds are consumers only.
          set: |
            *.cache-to=

      - name: Extract binaries from container
        run: |
          docker create --name extract ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}/builder:sha-${{ github.sha }}-${{ matrix.arch }}
          docker cp extract:/opt/virtmcu ./virtmcu-dist
          docker rm extract

          # Include basic project info
          cp LICENSE ./virtmcu-dist/
          cat > ./virtmcu-dist/README-BINARY.md <<EOF
          # virtmcu QEMU Binaries

          This package contains a patched version of QEMU with support for:
          - arm-generic-fdt machine
          - Zenoh-based deterministic networking and clock synchronization
          - Dynamic QOM plugin loading

          ## System Requirements
          This is a dynamically linked QEMU build for Ubuntu 24.04 (or compatible glibc-based Linux).
          You will need the following runtime dependencies installed on your host:
          sudo apt-get update && sudo apt-get install -y libglib2.0-0t64 libpixman-1-0 libslirp0

          ## Architecture
          - Host: ${{ matrix.arch }}
          - Target Guest Support: ARM, RISC-V (32/64)

          ## Usage
          The binaries in bin/ have their RPATH set to find libraries in ../lib/.
          No LD_LIBRARY_PATH should be required.

          Example:
          ./bin/qemu-system-arm -M arm-generic-fdt -dtb your_board.dtb
          EOF


      - name: Portable Smoke Test
        run: |
          # Test the extracted binary in a clean debian container
          docker run --rm -v "$(pwd)/virtmcu-dist":/virtmcu-dist debian:${{ env.DEBIAN_CODENAME }}-slim bash -c "
            apt-get update && apt-get install -y --no-install-recommends libglib2.0-0t64 libpixman-1-0 libslirp0

            /virtmcu-dist/bin/qemu-system-arm --version
            /virtmcu-dist/bin/qemu-system-riscv64 --version

            # Find where the modules actually are (handling triplet or flattened paths)
            MOD_DIR=\$(find /virtmcu-dist/lib -name 'hw-virtmcu-educational-dummy.so' -print -quit | xargs dirname)
            if [ -n \"\$MOD_DIR\" ]; then
              echo \"Found virtmcu modules at: \$MOD_DIR\"
              export QEMU_MODULE_DIR=\"\$MOD_DIR\"
            fi

            # Verify that it can find the modules
            if ! /virtmcu-dist/bin/qemu-system-arm -device help | grep -q 'dummy-device'; then
              echo \"ERROR: 'dummy-device' not found in -device help!\"
              echo \"Available devices:\"
              /virtmcu-dist/bin/qemu-system-arm -device help
              exit 1
            fi
            echo \"✓ Smoke test passed: dummy-device found.\"
          "

      - name: Create Tarball
        run: |
          TARBALL_NAME="virtmcu-qemu-${{ env.QEMU_VERSION }}-${{ matrix.arch }}.tar.gz"
          tar -czf "$TARBALL_NAME" -C ./virtmcu-dist .
          echo "TARBALL_PATH=$TARBALL_NAME" >> "$GITHUB_ENV"

      - name: Build virtmcu-tools
        if: matrix.arch == 'amd64'
        run: |
          # Build only once (on amd64 runner) since it's a pure python package
          cd packaging/virtmcu-tools
          curl -LsSf https://astral.sh/uv/install.sh | sh
          export PATH="$HOME/.local/bin:$PATH"
          uv build
          cp dist/* ../../

      - name: Upload Artifact
        uses: actions/upload-artifact@v6
        with:
          name: virtmcu-release-assets-${{ matrix.arch }}
          path: |
            ${{ env.TARBALL_PATH }}
            *.whl
            *.tar.gz

  create-release:
    name: Create Release
    needs: build-binaries
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v6
        with:
          path: artifacts
          pattern: virtmcu-release-assets-*
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/virtmcu-qemu-*.tar.gz
            artifacts/*.whl
            artifacts/virtmcu_tools-*.tar.gz
          generate_release_notes: true
          draft: false
          prerelease: false
